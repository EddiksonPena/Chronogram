---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: chronogram-platform-internal
  namespace: chronogram
spec:
  podSelector:
    matchExpressions:
      - key: app
        operator: In
        values:
          - chronogram-redis
          - chronogram-weaviate
          - chronogram-neo4j
          - chronogram-temporal
          - chronogram-temporal-postgresql
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchExpressions:
              - key: app
                operator: In
                values:
                  - chronogram-memory-api
                  - chronogram-worker
                  - chronogram-temporal
                  - chronogram-temporal-postgresql
                  - chronogram-redis
                  - chronogram-weaviate
                  - chronogram-neo4j
  egress:
    - to:
        - podSelector:
            matchExpressions:
              - key: app
                operator: In
                values:
                  - chronogram-memory-api
                  - chronogram-worker
                  - chronogram-temporal
                  - chronogram-temporal-postgresql
                  - chronogram-redis
                  - chronogram-weaviate
                  - chronogram-neo4j
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
