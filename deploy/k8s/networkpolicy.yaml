apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: chronogram-default-deny
  namespace: chronogram
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: chronogram-memory-api
  namespace: chronogram
spec:
  podSelector:
    matchLabels:
      app: chronogram-memory-api
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 4000
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: chronogram-redis
      ports:
        - protocol: TCP
          port: 6379
    - to:
        - podSelector:
            matchLabels:
              app: chronogram-weaviate
      ports:
        - protocol: TCP
          port: 8080
        - protocol: TCP
          port: 50051
    - to:
        - podSelector:
            matchLabels:
              app: chronogram-neo4j
      ports:
        - protocol: TCP
          port: 7687
        - protocol: TCP
          port: 7474
    - to:
        - podSelector:
            matchLabels:
              app: chronogram-temporal
      ports:
        - protocol: TCP
          port: 7233
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    - to:
        - namespaceSelector: {}
---
