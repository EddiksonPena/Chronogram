        - protocol: TCP
          port: 50051
    - to:
        - podSelector:
            matchLabels:
              app: chronogram-neo4j
      ports:
        - protocol: TCP
          port: 7687
        - protocol: TCP
          port: 7474
    - to:
        - podSelector:
            matchLabels:
              app: chronogram-temporal
      ports:
        - protocol: TCP
