apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: chronogram-memory-api
  namespace: chronogram
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: chronogram-memory-api
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 75
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
    scaleDown:
      stabilizationWindowSeconds: 300
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: chronogram-worker
  namespace: chronogram
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: chronogram-worker
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
    scaleDown:
      stabilizationWindowSeconds: 300
