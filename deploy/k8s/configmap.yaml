apiVersion: v1
kind: ConfigMap
metadata:
  name: chronogram-config
  namespace: chronogram
data:
  MEMORY_API_PORT: "4000"
  WORKER_PORT: "4010"
  REDIS_URL: "redis://redis:6379"
  MEMORY_STATE_BACKEND: "redis"
  MEMORY_STATE_REDIS_KEY: "chronogram:state:v1"
  WEAVIATE_HTTP_URL: "http://weaviate:8080"
  NEO4J_URI: "bolt://neo4j:7687"
  NEO4J_USERNAME: "neo4j"
  TEMPORAL_ADDRESS: "temporal-frontend:7233"
  TEMPORAL_NAMESPACE: "default"
  TEMPORAL_WORKFLOW_TASK_QUEUE: "chronogram-memory-module"
  TEMPORAL_EXECUTION_MODE: "temporal"
  TEMPORAL_GRAPH_BACKEND: "neo4j-temporal"
  EMBEDDING_MODEL: "nomic-embed-text"
  EXTRACTION_MODEL: "qwen2.5:14b"
  MAX_REQUEST_BYTES: "1048576"
  SHUTDOWN_TIMEOUT_MS: "10000"
  CHRONOGRAM_AUTH_MODE: "hybrid"
  CHRONOGRAM_JWT_ISSUER: "https://issuer.example.com/"
  CHRONOGRAM_JWT_AUDIENCE: "chronogram-api"
  CHRONOGRAM_JWKS_URL: ""
  CHRONOGRAM_JWT_REQUIRED_SCOPES: "chronogram.read,chronogram.write"
