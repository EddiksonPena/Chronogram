services:
  postgres:
    image: postgres:16
    container_name: memcortex-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: brain_runtime
      POSTGRES_USER: brain
      POSTGRES_PASSWORD: brain
    ports:
      - "${POSTGRES_PUBLIC_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: memcortex-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PUBLIC_PORT:-6379}:6379"
    volumes:
      - redis_data:/data

  neo4j:
    image: neo4j:5
    container_name: memcortex-neo4j
    restart: unless-stopped
    environment:
      NEO4J_AUTH: neo4j/password12345
      NEO4J_PLUGINS: "[\"apoc\"]"
    ports:
      - "${NEO4J_HTTP_PUBLIC_PORT:-7474}:7474"
      - "${NEO4J_BOLT_PUBLIC_PORT:-7687}:7687"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs

  weaviate:
    image: semitechnologies/weaviate:1.25.5
    container_name: memcortex-weaviate
    restart: unless-stopped
    ports:
      - "${WEAVIATE_PUBLIC_PORT:-8080}:8080"
    environment:
      QUERY_DEFAULTS_LIMIT: 25
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: "true"
      PERSISTENCE_DATA_PATH: "/var/lib/weaviate"
      DEFAULT_VECTORIZER_MODULE: none
      ENABLE_MODULES: ""
      CLUSTER_HOSTNAME: node1
    volumes:
      - weaviate_data:/var/lib/weaviate

  temporal:
    image: temporalio/auto-setup:1.24.2
    container_name: memcortex-temporal
    restart: unless-stopped
    environment:
      DB: postgres12
      DB_PORT: 5432
      POSTGRES_USER: brain
      POSTGRES_PWD: brain
      POSTGRES_SEEDS: postgres
    depends_on:
      - postgres
    ports:
      - "${TEMPORAL_PUBLIC_PORT:-7233}:7233"

  temporal-ui:
    image: temporalio/ui:2.27.0
    container_name: memcortex-temporal-ui
    restart: unless-stopped
    environment:
      TEMPORAL_ADDRESS: temporal:7233
    depends_on:
      - temporal
    ports:
      - "${TEMPORAL_UI_PUBLIC_PORT:-8233}:8080"

  opa:
    image: openpolicyagent/opa:1.2.0-static
    container_name: memcortex-opa
    restart: unless-stopped
    command: ["run", "--server", "--addr=0.0.0.0:8181", "/policy"]
    volumes:
      - ./infra/opa:/policy
    ports:
      - "${OPA_PUBLIC_PORT:-8181}:8181"

  keycloak:
    image: quay.io/keycloak/keycloak:25.0
    container_name: memcortex-keycloak
    restart: unless-stopped
    command: ["start-dev"]
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "${KEYCLOAK_PUBLIC_PORT:-8081}:8080"

  api:
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
    container_name: memcortex-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://brain:brain@postgres:5432/brain_runtime
    depends_on:
      - postgres
      - redis
      - neo4j
      - weaviate
      - temporal
      - opa
      - keycloak
    ports:
      - "${API_PUBLIC_PORT:-8000}:8000"
    volumes:
      - .:/app

  workers:
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
    container_name: memcortex-workers
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://brain:brain@postgres:5432/brain_runtime
    command: ["python", "-m", "apps.workers.main"]
    depends_on:
      - temporal
    volumes:
      - .:/app

  mcp-server:
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
    container_name: memcortex-mcp
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://brain:brain@postgres:5432/brain_runtime
    command: ["uvicorn", "apps.mcp_server.main:app", "--host", "0.0.0.0", "--port", "8100"]
    depends_on:
      - api
    ports:
      - "${MCP_PUBLIC_PORT:-8100}:8100"
    volumes:
      - .:/app

  dashboard:
    build:
      context: .
      dockerfile: infra/docker/dashboard.Dockerfile
    container_name: memcortex-dashboard
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - api
    ports:
      - "${DASHBOARD_PUBLIC_PORT:-3000}:3000"
    volumes:
      - .:/app

volumes:
  postgres_data:
  redis_data:
  neo4j_data:
  neo4j_logs:
  weaviate_data:
